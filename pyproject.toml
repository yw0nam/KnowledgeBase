[project]
name = "knowledgebase"
version = "0.1.0"
description = "Personal LLM Wiki + MCP server"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "black>=26.3.1",
    "fastmcp>=3.2.4",
    "graphifyy>=0.4.14",
    "networkx>=3.0",
    "pydantic>=2.0",
    "ruff>=0.15.12",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["test"]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["src/kb_mcp"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
kb-mcp = "kb_mcp.server:main"
kb-lint-wiki = "kb_mcp.cli.lint_wiki:main"
kb-graph-query = "kb_mcp.cli.graph_query:main"
