name: Feature Request
description: Suggest a new feature or enhancement for KnowledgeBase
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what problem you're
        trying to solve and how you'd like it to work.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      description: Which part of the project does this relate to?
      options:
        - "1. Ingest pipeline (scripts/ingest-github.sh)"
        - "2. Graph build (graphify integration)"
        - "3. Fill — LLM wiki writing"
        - "4. Lint (lint_wiki / scripts/lint.sh)"
        - "5. Log"
        - "src/kb_mcp — MCP server / core / tools"
        - "CI / GitHub Actions"
        - "Docs / CLAUDE.md"
        - "Other (specify below)"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, links, screenshots, etc.
